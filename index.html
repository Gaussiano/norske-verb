<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Norske Verb — Aprende verbos noruegos</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..900;1,9..144,300..900&family=DM+Sans:opsz,wght@9..40,300..700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f5f1e8;
  --bg-warm: #ede5d3;
  --ink: #0d1f2d;
  --ink-soft: #2a4053;
  --ink-muted: #5a6e7e;
  --paper: #fbf8f0;
  --rule: #cdc4ac;
  --accent: #1a4d5c;
  --accent-dark: #0f3540;
  --aurora: #5b8c6c;
  --aurora-soft: #cfe0d4;
  --coral: #c4513c;
  --coral-soft: #f4d8cd;
  --amber: #b08846;
  --amber-soft: #efe2c5;
  --gold: #8a6d2e;
  --shadow: 0 1px 3px rgba(13, 31, 45, 0.08), 0 8px 24px rgba(13, 31, 45, 0.06);
  --shadow-lg: 0 4px 12px rgba(13, 31, 45, 0.10), 0 24px 48px rgba(13, 31, 45, 0.10);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  background: var(--bg);
  color: var(--ink);
  font-family: 'DM Sans', system-ui, sans-serif;
  font-size: 16px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  min-height: 100vh;
}

body {
  background:
    radial-gradient(ellipse 80% 60% at 0% 0%, rgba(26, 77, 92, 0.08), transparent 60%),
    radial-gradient(ellipse 60% 80% at 100% 100%, rgba(176, 136, 70, 0.06), transparent 60%),
    var(--bg);
}

.app {
  max-width: 1100px;
  margin: 0 auto;
  padding: 32px 24px 80px;
}

/* ==== HEADER ==== */
header.masthead {
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  padding-bottom: 18px;
  border-bottom: 1px solid var(--rule);
  margin-bottom: 24px;
  flex-wrap: wrap;
  gap: 16px;
}

.brand {
  display: flex;
  align-items: baseline;
  gap: 14px;
}

.brand h1 {
  font-family: 'Fraunces', serif;
  font-variation-settings: 'opsz' 144, 'SOFT' 50;
  font-weight: 500;
  font-size: clamp(28px, 4vw, 40px);
  letter-spacing: -0.02em;
  color: var(--ink);
  font-style: italic;
}

.brand h1 em {
  font-style: normal;
  color: var(--accent);
  font-variation-settings: 'opsz' 144, 'SOFT' 50;
}

.brand .dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--coral);
  display: inline-block;
}

.subtitle {
  font-family: 'Fraunces', serif;
  font-style: italic;
  font-size: 14px;
  color: var(--ink-muted);
  letter-spacing: 0.02em;
}

.meta-strip {
  display: flex;
  gap: 18px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: var(--ink-muted);
}

.meta-strip .num {
  color: var(--accent);
  font-weight: 600;
}

/* ==== TABS ==== */
nav.tabs {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 0;
  border: 1px solid var(--rule);
  border-radius: 2px;
  background: var(--paper);
  margin-bottom: 32px;
  overflow: hidden;
}

@media (max-width: 700px) {
  nav.tabs { grid-template-columns: repeat(2, 1fr); }
}

.tab {
  background: transparent;
  border: none;
  border-right: 1px solid var(--rule);
  padding: 18px 14px;
  text-align: left;
  cursor: pointer;
  font-family: 'DM Sans', sans-serif;
  transition: background 0.2s ease;
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.tab:last-child { border-right: none; }

@media (max-width: 700px) {
  .tab:nth-child(2) { border-right: none; }
  .tab:nth-child(1), .tab:nth-child(2) { border-bottom: 1px solid var(--rule); }
}

.tab:hover { background: var(--bg-warm); }

.tab.active {
  background: var(--ink);
  color: var(--paper);
}

.tab .num {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.15em;
  opacity: 0.6;
}

.tab .label {
  font-family: 'Fraunces', serif;
  font-weight: 500;
  font-size: 17px;
  letter-spacing: -0.01em;
}

.tab .hint {
  font-size: 11px;
  opacity: 0.7;
  font-style: italic;
}

/* ==== PANELS ==== */
.panel { display: none; }
.panel.active { display: block; animation: fadeIn 0.4s ease; }

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ==== CARD / PROMPT ==== */
.card {
  background: var(--paper);
  border: 1px solid var(--rule);
  border-radius: 4px;
  padding: 36px 32px;
  box-shadow: var(--shadow);
  margin-bottom: 20px;
}

.card.large { padding: 48px 36px; }

@media (max-width: 600px) {
  .card { padding: 24px 20px; }
  .card.large { padding: 28px 22px; }
}

.section-title {
  font-family: 'Fraunces', serif;
  font-style: italic;
  font-weight: 400;
  font-size: 14px;
  text-transform: uppercase;
  letter-spacing: 0.18em;
  color: var(--ink-muted);
  margin-bottom: 8px;
}

.kicker {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--accent);
  display: inline-block;
  margin-bottom: 18px;
  padding: 4px 10px;
  border: 1px solid var(--accent);
  border-radius: 999px;
}

.kicker.aurora { color: var(--aurora); border-color: var(--aurora); }
.kicker.coral { color: var(--coral); border-color: var(--coral); }
.kicker.amber { color: var(--amber); border-color: var(--amber); }

/* ==== INFINITIVE PROMPT ==== */
.infinitive-display {
  font-family: 'Fraunces', serif;
  font-weight: 400;
  font-size: clamp(38px, 7vw, 64px);
  line-height: 1.05;
  letter-spacing: -0.02em;
  color: var(--ink);
  margin: 8px 0 18px;
}

.infinitive-display .a-particle {
  font-style: italic;
  font-weight: 300;
  color: var(--ink-muted);
  margin-right: 8px;
}

.translation {
  font-family: 'Fraunces', serif;
  font-style: italic;
  font-size: 18px;
  color: var(--ink-soft);
  margin-bottom: 28px;
  font-weight: 300;
}

/* ==== INPUT FORM ==== */
.input-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 18px;
  margin-bottom: 20px;
}

@media (max-width: 600px) {
  .input-grid { grid-template-columns: 1fr; }
}

.field label {
  display: block;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.18em;
  color: var(--ink-muted);
  margin-bottom: 8px;
}

.field label .es {
  color: var(--ink-muted);
  opacity: 0.75;
  text-transform: none;
  letter-spacing: 0.04em;
  font-style: italic;
  font-family: 'Fraunces', serif;
  font-size: 11px;
}

.field input {
  width: 100%;
  padding: 14px 16px;
  border: 1px solid var(--rule);
  background: var(--bg);
  font-family: 'Fraunces', serif;
  font-size: 22px;
  color: var(--ink);
  border-radius: 2px;
  transition: all 0.2s ease;
}

.field input:focus {
  outline: none;
  border-color: var(--accent);
  background: var(--paper);
  box-shadow: 0 0 0 3px rgba(26, 77, 92, 0.1);
}

.field input.ok {
  border-color: var(--aurora);
  background: var(--aurora-soft);
  color: var(--accent-dark);
}

.field input.bad {
  border-color: var(--coral);
  background: var(--coral-soft);
}

/* ==== BUTTONS ==== */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 13px 22px;
  background: var(--ink);
  color: var(--paper);
  border: none;
  border-radius: 2px;
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  font-weight: 500;
  letter-spacing: 0.02em;
  cursor: pointer;
  transition: all 0.2s ease;
}

.btn:hover { background: var(--accent-dark); transform: translateY(-1px); }
.btn:active { transform: translateY(0); }

.btn.secondary {
  background: transparent;
  color: var(--ink);
  border: 1px solid var(--ink);
}
.btn.secondary:hover { background: var(--ink); color: var(--paper); }

.btn.ghost {
  background: transparent;
  color: var(--ink-muted);
  border: 1px solid var(--rule);
}
.btn.ghost:hover { background: var(--bg-warm); color: var(--ink); }

.btn.aurora {
  background: var(--aurora);
}
.btn.aurora:hover { background: #4a7459; }

.button-row {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
  align-items: center;
}

/* ==== SETTINGS BAR ==== */
.settings-bar {
  display: flex;
  align-items: center;
  gap: 24px;
  padding: 8px 24px;
  background: var(--bg-warm);
  border-bottom: 1px solid var(--rule);
  font-size: 13px;
}
.setting-toggle {
  display: flex;
  align-items: center;
  gap: 8px;
  cursor: pointer;
  user-select: none;
}
.setting-toggle input { display: none; }
.toggle-track {
  width: 36px; height: 20px;
  border-radius: 10px;
  background: var(--rule);
  position: relative;
  transition: background .2s;
  flex-shrink: 0;
}
.setting-toggle input:checked + .toggle-track { background: var(--teal); }
.toggle-thumb {
  position: absolute;
  top: 3px; left: 3px;
  width: 14px; height: 14px;
  border-radius: 50%;
  background: #fff;
  transition: left .2s;
}
.setting-toggle input:checked + .toggle-track .toggle-thumb { left: 19px; }
.setting-label { color: var(--ink-muted); }
.setting-label b { color: var(--ink); }

/* ==== FEEDBACK ==== */
.feedback {
  margin-top: 18px;
  padding: 18px 22px;
  border-radius: 2px;
  border-left: 3px solid;
  font-family: 'Fraunces', serif;
  font-size: 16px;
  line-height: 1.55;
  display: none;
  animation: slideIn 0.3s ease;
}

@keyframes slideIn {
  from { opacity: 0; transform: translateX(-6px); }
  to { opacity: 1; transform: translateX(0); }
}

.feedback.show { display: block; }

.feedback.correct {
  background: var(--aurora-soft);
  border-color: var(--aurora);
  color: var(--accent-dark);
}

.feedback.incorrect {
  background: var(--coral-soft);
  border-color: var(--coral);
  color: #6b2517;
}

.feedback strong {
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  display: block;
  margin-bottom: 6px;
}

.feedback .form-list {
  margin-top: 10px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  background: rgba(255,255,255,0.5);
  padding: 10px 12px;
  border-radius: 2px;
}
.feedback .form-list span { color: var(--ink-muted); }
.feedback .form-list b { color: var(--ink); font-weight: 600; }

/* ==== PROGRESS / STATS ==== */
.stats-bar {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 1px;
  background: var(--rule);
  border: 1px solid var(--rule);
  margin-bottom: 24px;
  border-radius: 2px;
  overflow: hidden;
}

@media (max-width: 600px) {
  .stats-bar { grid-template-columns: repeat(2, 1fr); }
}

.stat {
  background: var(--paper);
  padding: 14px 16px;
  text-align: left;
}

.stat .stat-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  text-transform: uppercase;
  letter-spacing: 0.18em;
  color: var(--ink-muted);
  margin-bottom: 4px;
}

.stat .stat-value {
  font-family: 'Fraunces', serif;
  font-size: 24px;
  font-weight: 500;
  color: var(--ink);
}

.stat .stat-value.aurora { color: var(--aurora); }
.stat .stat-value.coral { color: var(--coral); }

.progress-track {
  height: 6px;
  background: var(--bg-warm);
  border-radius: 3px;
  overflow: hidden;
  margin-top: 12px;
}

.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--accent), var(--aurora));
  width: 0%;
  transition: width 0.6s cubic-bezier(0.16, 1, 0.3, 1);
  border-radius: 3px;
}

/* ==== LEVEL BANNER ==== */
.level-banner {
  background: var(--ink);
  color: var(--paper);
  padding: 22px 26px;
  border-radius: 2px;
  margin-bottom: 20px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
  gap: 16px;
}

.level-banner .level-info { }
.level-banner .level-info .label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  opacity: 0.7;
  margin-bottom: 4px;
}
.level-banner .level-info .title {
  font-family: 'Fraunces', serif;
  font-size: 22px;
  font-weight: 400;
  font-style: italic;
}
.level-banner .level-info .title b {
  font-style: normal;
  color: #d4b88f;
}

/* ==== LEVEL UP CELEBRATION ==== */
.celebration {
  background: linear-gradient(135deg, var(--aurora) 0%, var(--accent) 100%);
  color: var(--paper);
  padding: 36px 32px;
  border-radius: 2px;
  text-align: center;
  margin-bottom: 20px;
}

.celebration h2 {
  font-family: 'Fraunces', serif;
  font-style: italic;
  font-weight: 400;
  font-size: 32px;
  margin-bottom: 10px;
}

.celebration p {
  font-size: 16px;
  opacity: 0.9;
  margin-bottom: 22px;
  line-height: 1.6;
}

.celebration .button-row { justify-content: center; }
.celebration .btn { background: var(--paper); color: var(--ink); }
.celebration .btn:hover { background: #fff; }
.celebration .btn.ghost { background: transparent; color: var(--paper); border-color: rgba(255,255,255,0.4); }
.celebration .btn.ghost:hover { background: rgba(255,255,255,0.1); }

/* ==== MODULE 3 SENTENCE ==== */
.sentence {
  font-family: 'Fraunces', serif;
  font-size: clamp(22px, 3.5vw, 30px);
  line-height: 1.5;
  font-weight: 400;
  margin: 16px 0 24px;
  color: var(--ink);
}

.sentence .blank-spot {
  display: inline-block;
  background: var(--bg-warm);
  border-bottom: 2px solid var(--accent);
  padding: 0 14px;
  min-width: 110px;
  border-radius: 2px 2px 0 0;
}

.sentence .blank-spot input {
  border: none;
  background: transparent;
  font-family: 'Fraunces', serif;
  font-size: inherit;
  color: var(--ink);
  width: auto;
  min-width: 80px;
  padding: 2px 0;
  text-align: center;
  font-weight: 500;
}

.sentence .blank-spot input:focus {
  outline: none;
}

.sentence .blank-spot.ok {
  background: var(--aurora-soft);
  border-color: var(--aurora);
}

.sentence .blank-spot.bad {
  background: var(--coral-soft);
  border-color: var(--coral);
}

.hint-row {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--ink-muted);
  margin: 4px 0 24px;
  display: flex;
  flex-wrap: wrap;
  gap: 14px;
}

.hint-row .h {
  background: var(--bg-warm);
  padding: 4px 10px;
  border-radius: 2px;
}

.hint-row .h b { color: var(--accent); font-weight: 600; }
.hint-row .h.tense-pres b { color: var(--accent); }
.hint-row .h.tense-pret b { color: var(--amber); }
.hint-row .h.tense-inf b { color: var(--aurora); }

.translation-line {
  font-family: 'Fraunces', serif;
  font-style: italic;
  font-size: 15px;
  color: var(--ink-muted);
  padding-top: 14px;
  border-top: 1px dashed var(--rule);
  margin-top: 16px;
}

/* ==== MODULE 4 - DICTIONARY ==== */
.dict-controls {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
  margin-bottom: 18px;
  align-items: center;
}

.dict-controls .search {
  flex: 1;
  min-width: 200px;
}

.dict-controls input[type="text"] {
  width: 100%;
  padding: 11px 14px;
  border: 1px solid var(--rule);
  background: var(--paper);
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  border-radius: 2px;
}

.dict-controls input[type="text"]:focus {
  outline: none;
  border-color: var(--accent);
}

.sort-buttons {
  display: flex;
  gap: 0;
  border: 1px solid var(--rule);
  border-radius: 2px;
  overflow: hidden;
}

.sort-buttons button {
  background: var(--paper);
  border: none;
  padding: 11px 14px;
  font-family: 'DM Sans', sans-serif;
  font-size: 12px;
  cursor: pointer;
  border-right: 1px solid var(--rule);
  color: var(--ink-soft);
  transition: all 0.2s ease;
}

.sort-buttons button:last-child { border-right: none; }
.sort-buttons button:hover { background: var(--bg-warm); }
.sort-buttons button.active {
  background: var(--ink);
  color: var(--paper);
}

.dict-stats {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--ink-muted);
  margin-bottom: 12px;
}

.dict-table {
  background: var(--paper);
  border: 1px solid var(--rule);
  border-radius: 2px;
  overflow: hidden;
}

.dict-row {
  display: grid;
  grid-template-columns: 60px 1.5fr 1fr 1fr 1fr 2fr;
  gap: 0;
  border-bottom: 1px solid var(--rule);
  padding: 0;
  transition: background 0.15s ease;
}

.dict-row:last-child { border-bottom: none; }
.dict-row:hover { background: var(--bg-warm); }

.dict-row.header {
  background: var(--ink);
  color: var(--paper);
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.15em;
}

.dict-row.header:hover { background: var(--ink); }

.dict-row > div {
  padding: 12px 14px;
  font-family: 'Fraunces', serif;
  font-size: 15px;
  border-right: 1px solid var(--rule);
  display: flex;
  align-items: center;
}

.dict-row > div:last-child { border-right: none; }

.dict-row.header > div {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
}

.dict-row .grp {
  justify-content: center;
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  font-weight: 600;
  color: var(--paper);
  background: var(--accent);
}

.dict-row .grp.g1 { background: #4a7c59; }
.dict-row .grp.g2 { background: var(--accent); }
.dict-row .grp.g3 { background: var(--amber); }
.dict-row .grp.g4 { background: #8a6b9c; }
.dict-row .grp.irr { background: var(--coral); }

.dict-row .es {
  color: var(--ink-muted);
  font-style: italic;
  font-size: 14px;
}

@media (max-width: 800px) {
  .dict-row {
    grid-template-columns: 50px 1fr 1fr;
    grid-template-rows: auto auto;
  }
  .dict-row .grp { grid-row: 1 / 3; }
  .dict-row .es { grid-column: 1 / -1; padding-top: 0; padding-bottom: 12px; border-top: 1px dashed var(--rule); padding-left: 70px; }
  .dict-row.header .es { display: none; }
  .dict-row.header { grid-template-columns: 50px 1fr 1fr; }
}

/* ==== EMPTY STATE / INFO ==== */
.info-block {
  padding: 18px 22px;
  background: var(--bg-warm);
  border-left: 3px solid var(--amber);
  font-family: 'Fraunces', serif;
  font-size: 14px;
  font-style: italic;
  color: var(--ink-soft);
  margin-bottom: 20px;
  line-height: 1.6;
}

.info-block b {
  font-style: normal;
  color: var(--ink);
}

/* ==== TIPS / HINTS ==== */
.group-tag {
  display: inline-block;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.15em;
  padding: 3px 8px;
  border-radius: 2px;
  margin-right: 8px;
  background: var(--bg-warm);
  color: var(--ink-soft);
  border: 1px solid var(--rule);
}

.group-tag.g1 { background: #e0ebe3; border-color: #4a7c59; color: #2e4a37; }
.group-tag.g2 { background: #d8e4e8; border-color: var(--accent); color: var(--accent-dark); }
.group-tag.g3 { background: var(--amber-soft); border-color: var(--amber); color: #6b521e; }
.group-tag.g4 { background: #e8dded; border-color: #8a6b9c; color: #533866; }

/* Map for unique verbs (use infinitive as key). De-dup with Notater priority. */
(function dedupVerbs() {
  const seen = new Map();
  for (const v of VERBS) {
    const key = v.inf;
    if (!seen.has(key) || (v.noter && !seen.get(key).noter)) {
      seen.set(key, v);
    }
  }
  VERBS.length = 0;
  for (const v of seen.values()) VERBS.push(v);
})();

/* ============================================================
   HELPERS
   ============================================================ */

function normalize(s) {
  if (!s) return '';
  return s.trim().toLowerCase()
    .replace(/æ/g, 'æ').replace(/ø/g, 'ø').replace(/å/g, 'å')
    // accept ascii substitutions
    .replace(/\bae\b/g, 'æ')
    .replace(/oe(?![a-zæøå])/g, 'ø')
    .replace(/aa(?![a-zæøå])/g, 'å');
}

function compareForms(input, expected, alternates) {
  const a = normalize(input);
  const candidates = [expected, ...(alternates || [])].map(normalize);
  return candidates.includes(a);
}

// Returns the expected infinitive string based on the å setting
function getInfExpected(verbInf) {
  if (state.settings.askA) return verbInf; // full "å bo"
  return verbInf.replace(/^å /, '');        // just "bo"
}

function getAlternates(verbForm) {
  // Some verbs have alternate accepted forms
  const alts = {
    'ba': ['bad'],
    'bad': ['ba'],
    'ga': ['gav'],
    'gav': ['ga'],
    'sto': ['stod'],
    'stod': ['sto'],
    'forsto': ['forstod'],
    'forstod': ['forsto'],
    'tilbød': ['tilbod'],
    'dro': ['drog'],
    'drog': ['dro'],
    'beit': ['bet'],
    'bet': ['beit']
  };
  return alts[verbForm] || [];
}

function pickRandom(arr) {
  return arr[Math.floor(Math.random() * arr.length)];
}

function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function groupTagHTML(g) {
  const labels = { 1: 'Grupo 1 / -et', 2: 'Grupo 2 / -te', 3: 'Grupo 3 / -de', 4: 'Grupo 4 / -dde', 'irr': 'Irregular' };
  const cls = (g === 'irr') ? 'irr' : 'g' + g;
  return `<span class="group-tag ${cls}">${labels[g] || g}</span>`;
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
  }[c]));
}

/* ============================================================
   MODULE 1 - PROGRESSIVE LEARNING
   ============================================================ */

function getCurrentLevelVerbs() {
  const groups = [1, 2, 3, 4, 'irr'];
  const noterVerbs = VERBS.filter(v => v.noter);
  const currentLevel = state.m1.levelSize;

  // First, build levels from Notater verbs (group-balanced, 3-by-3)
  let activeVerbs = [];
  for (const g of groups) {
    const inGroup = noterVerbs
      .filter(v => v.group === g)
      .sort((a, b) => a.noterOrder - b.noterOrder)
      .slice(0, currentLevel);
    activeVerbs = activeVerbs.concat(inGroup);
  }

  // After Notater list is exhausted (level >= max needed), include extra verbs
  const maxNoterPerGroup = Math.max(...groups.map(g =>
    noterVerbs.filter(v => v.group === g).length
  ));

  if (currentLevel > maxNoterPerGroup) {
    // Add extra (non-noter) verbs progressively
    const extraPerGroup = currentLevel - maxNoterPerGroup;
    for (const g of groups) {
      const extra = VERBS
        .filter(v => v.group === g && !v.noter)
        .slice(0, extraPerGroup * 3); // 3 per "extra level step"
      activeVerbs = activeVerbs.concat(extra);
    }
  }

  return activeVerbs;
}

// Returns required correct count for a verb: 2 if new this level, 1 if from a prior level
function requiredForVerb(verbInf) {
  const prevLevelVerbs = getLevelVerbs(state.m1.levelSize - 1);
  const wasInPrevLevel = prevLevelVerbs.some(v => v.inf === verbInf);
  return wasInPrevLevel ? 1 : 2;
}

// Get verbs for a specific levelSize (used for prev-level check)
function getLevelVerbs(levelSize) {
  if (levelSize < 1) return [];
  const groups = [1, 2, 3, 4, 'irr'];
  const noterVerbs = VERBS.filter(v => v.noter);
  let activeVerbs = [];
  for (const g of groups) {
    const inGroup = noterVerbs
      .filter(v => v.group === g)
      .sort((a, b) => a.noterOrder - b.noterOrder)
      .slice(0, levelSize);
    activeVerbs = activeVerbs.concat(inGroup);
  }
  const maxNoterPerGroup = Math.max(...groups.map(g => noterVerbs.filter(v => v.group === g).length));
  if (levelSize > maxNoterPerGroup) {
    const extraPerGroup = levelSize - maxNoterPerGroup;
    for (const g of groups) {
      const extra = VERBS.filter(v => v.group === g && !v.noter).slice(0, extraPerGroup * 3);
      activeVerbs = activeVerbs.concat(extra);
    }
  }
  return activeVerbs;
}

function isLevelMastered() {
  const verbs = getCurrentLevelVerbs();
  if (verbs.length === 0) return false;
  return verbs.every(v => (state.m1.correctStreak[v.inf] || 0) >= requiredForVerb(v.inf));
}

function pickVerbM1() {
  const verbs = getCurrentLevelVerbs();
  if (verbs.length === 0) return null;
  // Prioritize verbs with lowest correctStreak count
  const minStreak = Math.min(...verbs.map(v => state.m1.correctStreak[v.inf] || 0));
  const candidates = verbs.filter(v => (state.m1.correctStreak[v.inf] || 0) === minStreak);
  // Avoid repeating the same one if possible
  if (state.m1.currentVerb && candidates.length > 1) {
    const filtered = candidates.filter(v => v.inf !== state.m1.currentVerb.inf);
    return pickRandom(filtered);
  }
  return pickRandom(candidates);
}

function renderM1() {
  const root = document.getElementById('m1-content');
  const verbs = getCurrentLevelVerbs();
  const noterVerbs = VERBS.filter(v => v.noter);
  const maxNoterPerGroup = Math.max(...[1,2,3,4,'irr'].map(g =>
    noterVerbs.filter(v => v.group === g).length
  ));

  // Check if level mastered
  if (isLevelMastered() && !state.m1.levelComplete) {
    state.m1.levelComplete = true;
  }

  let html = '';

  // Level banner
  const totalActive = verbs.length;
  const isPostNoter = state.m1.levelSize > maxNoterPerGroup;
  const levelLabel = isPostNoter
    ? `Nivel <b>${state.m1.levelSize}</b> · Curso libre (más allá del A1)`
    : `Nivel <b>${state.m1.levelSize}</b> · ${state.m1.levelSize * 5} verbos del curso A1`;

  html += `<div class="level-banner">
    <div class="level-info">
      <div class="label">Aprendizaje progresivo</div>
      <div class="title">${levelLabel}</div>
      <div class="level-list">${totalActive} verbos activos · sube de nivel cuando todos estén dominados</div>
    </div>
    <div class="button-row">
      <button class="btn ghost" onclick="renderM1Stats()">Ver lista del nivel</button>
      <button class="btn ghost" onclick="showUnlockDialog()" title="Desbloquear nivel con contraseña">🔓 Desbloquear nivel</button>
    </div>
  </div>`;

  // Stats bar
  const correctPct = state.m1.sessionStats.total > 0
    ? Math.round(100 * state.m1.sessionStats.correct / state.m1.sessionStats.total) : 0;

  const masteredCount = verbs.filter(v => (state.m1.correctStreak[v.inf] || 0) >= requiredForVerb(v.inf)).length;

  html += `<div class="stats-bar">
    <div class="stat">
      <div class="stat-label">Aciertos sesión</div>
      <div class="stat-value aurora">${state.m1.sessionStats.correct}</div>
    </div>
    <div class="stat">
      <div class="stat-label">Intentos</div>
      <div class="stat-value">${state.m1.sessionStats.total}</div>
    </div>
    <div class="stat">
      <div class="stat-label">% acierto</div>
      <div class="stat-value">${correctPct}%</div>
    </div>
    <div class="stat">
      <div class="stat-label">Dominados</div>
      <div class="stat-value">${masteredCount} / ${totalActive}</div>
    </div>
  </div>`;

  // Progress bar
  const progressPct = totalActive > 0 ? (masteredCount / totalActive) * 100 : 0;
  html += `<div class="progress-track" style="margin-bottom:24px;"><div class="progress-fill" style="width:${progressPct}%"></div></div>`;

  // If level complete, show celebration
  if (state.m1.levelComplete) {
    html += `<div class="celebration">
      <h2>¡Has dominado este nivel!</h2>
      <p>Has acertado todos los verbos del nivel ${state.m1.levelSize}.<br>¿Quieres añadir 3 verbos más por grupo y subir al siguiente nivel?</p>
      <div class="button-row">
        <button class="btn" onclick="advanceLevel()">Avanzar al nivel ${state.m1.levelSize + 1}</button>
        <button class="btn ghost" onclick="continuePracticing()">Seguir practicando este nivel</button>
      </div>
    </div>`;
    root.innerHTML = html;
    return;
  }

  // The actual quiz card
  if (!state.m1.currentVerb) {
    state.m1.currentVerb = pickVerbM1();
  }

  if (!state.m1.currentVerb) {
    html += `<div class="card large"><p>No hay verbos para mostrar. Reinicia el progreso si crees que es un error.</p></div>`;
    root.innerHTML = html;
    return;
  }

  html += renderQuizCard('m1', state.m1.currentVerb, state.m1.awaitingNext);

  root.innerHTML = html;
  attachQuizHandlers('m1');
}

function renderM1Stats() {
  const verbs = getCurrentLevelVerbs();
  let listHtml = '<div class="card"><div class="section-title">Lista del nivel actual</div>';
  listHtml += `<p style="font-family:'Fraunces',serif;font-style:italic;color:var(--ink-muted);margin-bottom:16px;">${verbs.length} verbos activos. Los verbos nuevos necesitan 2 aciertos; los del nivel anterior, 1.</p>`;
  listHtml += '<div class="dict-table">';
  listHtml += '<div class="dict-row header"><div></div><div>Infinitivo</div><div>Presente</div><div>Pretérito</div><div>Estado</div><div>Español</div></div>';
  for (const v of verbs) {
    const req = requiredForVerb(v.inf);
    const streak = state.m1.correctStreak[v.inf] || 0;
    const status = streak >= req ? '✓ dominado' : `· ${streak} / ${req}`;
    const cls = (v.group === 'irr') ? 'irr' : 'g' + v.group;
    listHtml += `<div class="dict-row">
      <div class="grp ${cls}">${v.group === 'irr' ? 'IR' : v.group}</div>
      <div>${escapeHtml(v.inf)}</div>
      <div>${escapeHtml(v.pres)}</div>
      <div>${escapeHtml(v.pret)}</div>
      <div style="color:${streak>=2?'var(--aurora)':'var(--ink-muted)'};font-family:'JetBrains Mono',monospace;font-size:12px;">${status}</div>
      <div class="es">${escapeHtml(v.es)}</div>
    </div>`;
  }
  listHtml += '</div>';
  listHtml += `<div style="margin-top:18px;"><button class="btn ghost" onclick="renderM1()">← Volver a practicar</button></div>`;
  listHtml += '</div>';
  document.getElementById('m1-content').innerHTML = listHtml;
}

function advanceLevel() {
  state.m1.levelSize += 1;
  state.m1.correctStreak = {};
  state.m1.levelComplete = false;
  state.m1.currentVerb = null;
  state.m1.awaitingNext = false;
  saveState();
  renderM1();
  updateMeta();
}

function continuePracticing() {
  state.m1.levelComplete = false;
  state.m1.currentVerb = null;
  state.m1.awaitingNext = false;
  renderM1();
}

    ? Math.round(100 * state.m2.sessionStats.correct / state.m2.sessionStats.total) : 0;

  html += `<div class="info-block">
    <b>Práctica aleatoria</b> — Aquí aparecen <b>todos los ${VERBS.length} verbos</b> en orden aleatorio.
    Sin niveles, sin filtros: solo conjuga.
  </div>`;

  html += `<div class="stats-bar">
    <div class="stat"><div class="stat-label">Aciertos</div><div class="stat-value aurora">${state.m2.sessionStats.correct}</div></div>
    <div class="stat"><div class="stat-label">Fallos</div><div class="stat-value coral">${state.m2.sessionStats.total - state.m2.sessionStats.correct}</div></div>
    <div class="stat"><div class="stat-label">Intentos</div><div class="stat-value">${state.m2.sessionStats.total}</div></div>
    <div class="stat"><div class="stat-label">% acierto</div><div class="stat-value">${correctPct}%</div></div>
  </div>`;

  if (!state.m2.currentVerb) {
    state.m2.currentVerb = pickVerbM2();
  }

  html += renderQuizCard('m2', state.m2.currentVerb, state.m2.awaitingNext);

  root.innerHTML = html;
  attachQuizHandlers('m2');
}

/* ============================================================
   QUIZ CARD (shared between M1 & M2)
   ============================================================ */

function renderQuizCard(mod, verb, awaitingNext) {
  const res = state[mod].fieldResults;

  function fieldHTML(id, labelNO, labelES, placeholder, resKey) {
    if (awaitingNext && res) {
      const r = res[resKey];
      const cls = r.ok ? 'ok' : 'bad';
      const displayVal = r.ok ? escapeHtml(r.got) : escapeHtml(r.correct);
      const style = r.ok ? 'color:var(--aurora);font-weight:600;' : 'color:var(--coral);font-weight:700;';
      return `<div class="field">
        <label>${labelNO} <span class="es">— ${labelES}</span></label>
        <input type="text" id="${mod}-${resKey}" class="${cls}" value="${displayVal}" style="${style}" readonly />
      </div>`;
    }
    return `<div class="field">
      <label>${labelNO} <span class="es">— ${labelES}</span></label>
      <input type="text" id="${mod}-${resKey}" autocomplete="off" autocapitalize="off" spellcheck="false" />
    </div>`;
  }

  return `<div class="card large">
    <span class="kicker">CONJUGA EN NORUEGO</span>
    <div class="section-title">Escribe las tres formas de este verbo</div>
    <div class="infinitive-display" style="font-size:clamp(32px,5vw,52px);margin-bottom:6px;">${escapeHtml(verb.es)}</div>

    <div class="input-grid" style="grid-template-columns:1fr 1fr 1fr;">
      ${fieldHTML(mod, 'Infinitiv', state.settings.askA ? 'å …' : 'sin å', 'infinitivo', 'inf')}
      ${fieldHTML(mod, 'Presens', 'presente', 'presente', 'pres')}
      ${fieldHTML(mod, 'Preteritum', 'pretérito', 'pretérito', 'pret')}
    </div>

    <div class="button-row">
      ${awaitingNext
        ? `<button class="btn aurora" id="${mod}-next">Siguiente verbo →</button>
           <button class="btn ghost" id="${mod}-skip">Saltar este</button>`
        : `<button class="btn" id="${mod}-check">Comprobar</button>
           <button class="btn ghost" id="${mod}-reveal">Mostrar respuesta</button>`}
    </div>

    <div class="feedback" id="${mod}-feedback"></div>
  </div>`;
}

function attachQuizHandlers(mod) {
  const inpInf  = document.getElementById(mod + '-inf');
  const inpPres = document.getElementById(mod + '-pres');
  const inpPret = document.getElementById(mod + '-pret');
  if (inpInf) {
    inpInf.focus();
    inpInf.addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); if (inpPres) inpPres.focus(); } });
  }
  if (inpPres) {
    inpPres.addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); if (inpPret) inpPret.focus(); } });
  }
  if (inpPret) {
    inpPret.addEventListener('keydown', e => { if (e.key === 'Enter') {
      e.preventDefault();
      const checkBtn = document.getElementById(mod + '-check');
      const nextBtn  = document.getElementById(mod + '-next');
      if (checkBtn) { enterCooldown = true; setTimeout(() => { enterCooldown = false; }, 300); checkBtn.click(); }
      else if (nextBtn) nextBtn.click();
    }});
  }
  const checkBtn = document.getElementById(mod + '-check');
  if (checkBtn) checkBtn.onclick = () => checkAnswer(mod);
  const nextBtn = document.getElementById(mod + '-next');
  if (nextBtn) nextBtn.onclick = () => nextQuestion(mod);
  const skipBtn = document.getElementById(mod + '-skip');
  if (skipBtn) skipBtn.onclick = () => nextQuestion(mod);
  const revealBtn = document.getElementById(mod + '-reveal');
  if (revealBtn) revealBtn.onclick = () => revealAnswer(mod);
}

function checkAnswer(mod) {
  const verb = state[mod].currentVerb;
  const inpInf  = document.getElementById(mod + '-inf');
  const inpPres = document.getElementById(mod + '-pres');
  const inpPret = document.getElementById(mod + '-pret');

  const gotInf  = inpInf  ? inpInf.value.trim()  : '';
  const gotPres = inpPres ? inpPres.value.trim() : '';
  const gotPret = inpPret ? inpPret.value.trim() : '';

  // Find which verb the user intended — try the current verb first,
  // then any synonym (same Spanish translation) that matches what was typed
  const synonyms = VERBS.filter(v =>
    v.es === verb.es ||
    v.es.split(',').map(s => s.trim()).some(s => verb.es.split(',').map(t => t.trim()).includes(s))
  );

  let matchedVerb = null;
  let infOK = false, presOK = false, pretOK = false;

  for (const candidate of synonyms) {
    const stem = getInfExpected(candidate.inf);
    const iOK = compareForms(gotInf,  stem,           []);
    const rOK = compareForms(gotPres, candidate.pres, getAlternates(candidate.pres));
    const tOK = compareForms(gotPret, candidate.pret, getAlternates(candidate.pret));
    if (iOK) {
      matchedVerb = candidate;
      infOK  = true;
      presOK = rOK;
      pretOK = tOK;
      break;
    }
  }

  if (!matchedVerb) {
    matchedVerb = verb;
    infOK  = false;
    presOK = compareForms(gotPres, verb.pres, getAlternates(verb.pres));
    pretOK = compareForms(gotPret, verb.pret, getAlternates(verb.pret));
  }

  const verbStem = getInfExpected(matchedVerb.inf);

  // Store results so renderQuizCard can display them after re-render
  state[mod].fieldResults = {
    inf:  { ok: infOK,  got: gotInf,  correct: verbStem },
    pres: { ok: presOK, got: gotPres, correct: matchedVerb.pres },
    pret: { ok: pretOK, got: gotPret, correct: matchedVerb.pret }
  };

  // If a synonym was accepted but it's not the "official" verb, note it
  const usedSynonym = matchedVerb.inf !== verb.inf;
  const synonymNote = usedSynonym
    ? `<div style="margin-top:6px;font-size:13px;">Has usado el sinónimo <b>${escapeHtml(matchedVerb.inf)}</b> — también válido.</div>`
    : '';

  // Show all synonyms in the "correct forms" list
  const allSynonymsHTML = synonyms.length > 1
    ? `<div style="margin-top:6px;font-size:12px;color:var(--ink-muted);font-style:italic;">Sinónimos: ${synonyms.map(s => escapeHtml(s.inf)).join(', ')}</div>`
    : '';

  state[mod].sessionStats.total += 1;

  let feedbackCls, feedbackHTML;
  if (infOK && presOK && pretOK) {
    state[mod].sessionStats.correct += 1;
    if (mod === 'm1') {
      state.m1.correctStreak[verb.inf] = (state.m1.correctStreak[verb.inf] || 0) + 1;
    }
    feedbackCls = 'feedback correct show';
    feedbackHTML = `<strong>Riktig! · Correcto</strong>
      ${groupTagHTML(matchedVerb.group)}
      ${synonymNote}
      ${matchedVerb.note ? `<div style="margin-top:8px;font-size:14px;font-style:italic;">${escapeHtml(matchedVerb.note)}</div>` : ''}
      <div class="form-list">
        <span>infinitivo:</span> <b>${escapeHtml(matchedVerb.inf)}</b> ·
        <span>pres.:</span> <b>${escapeHtml(matchedVerb.pres)}</b> ·
        <span>pret.:</span> <b>${escapeHtml(matchedVerb.pret)}</b> ·
        <span>perf.:</span> <b>${escapeHtml(matchedVerb.perf)}</b>
      </div>${allSynonymsHTML}
      <div style="margin-top:12px;"><button class="btn ghost" style="font-size:12px;padding:4px 10px;" onclick="reportError(buildReportContext('${mod}'))">⚑ Reportar error</button></div>`;
  } else {
    if (mod === 'm1') state.m1.correctStreak[verb.inf] = 0;
    let why = [];
    if (!infOK)  why.push('el <b>infinitivo</b>');
    if (!presOK) why.push('el <b>presente</b>');
    if (!pretOK) why.push('el <b>pretérito</b>');
    feedbackCls = 'feedback incorrect show';
    // Show all accepted synonyms so the user knows what would be valid
    const acceptedList = synonyms.map(s => `<b>${escapeHtml(s.inf)}</b>`).join(', ');
    feedbackHTML = `<strong>Feil · Incorrecto</strong>
      ${groupTagHTML(matchedVerb.group)}
      <div style="margin-top:6px;">Hay errores en: ${why.join(', ')}.</div>
      ${synonyms.length > 1 ? `<div style="margin-top:6px;font-size:13px;">Infinitivos válidos: ${acceptedList}</div>` : ''}
      <div style="margin-top:8px;font-style:italic;">${explainGroup(matchedVerb)}</div>
      ${matchedVerb.note ? `<div style="margin-top:8px;font-size:14px;font-weight:500;">⚠ ${escapeHtml(matchedVerb.note)}</div>` : ''}
      <div class="form-list">
        <span>infinitivo:</span> <b>${escapeHtml(matchedVerb.inf)}</b> ·
        <span>pres.:</span> <b>${escapeHtml(matchedVerb.pres)}</b> ·
        <span>pret.:</span> <b>${escapeHtml(matchedVerb.pret)}</b> ·
        <span>perf.:</span> <b>${escapeHtml(matchedVerb.perf)}</b>
      </div>
      <div style="margin-top:12px;"><button class="btn ghost" style="font-size:12px;padding:4px 10px;" onclick="reportError(buildReportContext('${mod}'))">⚑ Reportar error</button></div>`;
  }

  state[mod].pendingFeedback = { cls: feedbackCls, html: feedbackHTML };
  state[mod].awaitingNext = true;
  saveState();
  if (mod === 'm1') renderM1();
  if (mod === 'm2') renderM2();
  updateMeta();

  const fb = document.getElementById(mod + '-feedback');
  if (fb && state[mod].pendingFeedback) {
    fb.className = state[mod].pendingFeedback.cls;
    fb.innerHTML = state[mod].pendingFeedback.html;
  }
}

function revealAnswer(mod) {
  const verb = state[mod].currentVerb;
  const verbStem = verb.inf.replace(/^å /, '');

  const gotInf  = (document.getElementById(mod + '-inf')  || {}).value || '';
  const gotPres = (document.getElementById(mod + '-pres') || {}).value || '';
  const gotPret = (document.getElementById(mod + '-pret') || {}).value || '';

  // All synonyms for this verb
  const synonyms = VERBS.filter(v =>
    v.es === verb.es ||
    v.es.split(',').map(s => s.trim()).some(s => verb.es.split(',').map(t => t.trim()).includes(s))
  );
  const acceptedList = synonyms.map(s => `<b>${escapeHtml(s.inf)}</b>`).join(', ');

  state[mod].fieldResults = {
    inf:  { ok: false, got: gotInf,  correct: getInfExpected(verb.inf) },
    pres: { ok: false, got: gotPres, correct: verb.pres },
    pret: { ok: false, got: gotPret, correct: verb.pret }
  };

  state[mod].sessionStats.total += 1;
  if (mod === 'm1') state.m1.correctStreak[verb.inf] = 0;

  state[mod].pendingFeedback = {
    cls: 'feedback show',
    html: `<strong>Respuesta revelada · Feil</strong>
      ${groupTagHTML(verb.group)}
      ${synonyms.length > 1 ? `<div style="margin-top:6px;font-size:13px;">Infinitivos válidos: ${acceptedList}</div>` : ''}
      <div style="margin-top:8px;font-style:italic;">${explainGroup(verb)}</div>
      ${verb.note ? `<div style="margin-top:8px;font-weight:500;">⚠ ${escapeHtml(verb.note)}</div>` : ''}
      <div class="form-list">
        <span>infinitivo:</span> <b>${escapeHtml(verb.inf)}</b> ·
        <span>pres.:</span> <b>${escapeHtml(verb.pres)}</b> ·
        <span>pret.:</span> <b>${escapeHtml(verb.pret)}</b> ·
        <span>perf.:</span> <b>${escapeHtml(verb.perf)}</b>
      </div>
      <div style="margin-top:12px;"><button class="btn ghost" style="font-size:12px;padding:4px 10px;" onclick="reportError(buildReportContext('${mod}'))">⚑ Reportar error</button></div>`,
    amber: true
  };

  state[mod].awaitingNext = true;
  saveState();
  if (mod === 'm1') renderM1();
  if (mod === 'm2') renderM2();
  updateMeta();

  const fb = document.getElementById(mod + '-feedback');
  if (fb && state[mod].pendingFeedback) {
    fb.className = state[mod].pendingFeedback.cls;
    if (state[mod].pendingFeedback.amber) {
      fb.style.background = 'var(--bg-warm)';
      fb.style.borderColor = 'var(--amber)';
      fb.style.color = 'var(--ink)';
    }
    fb.innerHTML = state[mod].pendingFeedback.html;
  }
}

function nextQuestion(mod) {
  state[mod].currentVerb = null;
  state[mod].awaitingNext = false;
  state[mod].fieldResults = null;
  state[mod].pendingFeedback = null;
  if (mod === 'm1') renderM1();
  if (mod === 'm2') renderM2();
}

function explainGroup(verb) {
  const explanations = {
    1: `<b>Grupo 1 (-et)</b>: vocal corta + consonante doble o múltiple. El presente añade <b>-r</b> al infinitivo, el pretérito añade <b>-et</b>. Ejemplo: jobbe → jobber → jobbet.`,
    2: `<b>Grupo 2 (-te)</b>: vocal larga + consonante simple, o terminaciones como <b>-se</b>, <b>-ke</b>, <b>-pe</b>, <b>-ere</b>. El pretérito acaba en <b>-te</b>. Ejemplo: spise → spiser → spiste.`,
    3: `<b>Grupo 3 (-de)</b>: verbos que acaban en <b>-eie</b> o <b>-ve</b>. El pretérito acaba en <b>-de</b>. Ejemplo: leie → leier → leide.`,
    4: `<b>Grupo 4 (-dde)</b>: verbos monosílabos terminados en vocal (no -e). El pretérito duplica la <b>d</b>: <b>-dde</b>. Ejemplo: bo → bor → bodde.`,
    'irr': `<b>Verbo irregular (sterk verb)</b>: hay que aprenderlo de memoria. Suele cambiar la vocal en el pretérito y no sigue las terminaciones regulares. Ejemplo: drikke → drikker → drakk.`
  };
  return explanations[verb.group] || '';
}

/* ============================================================
   MODULE 3 - FILL IN THE BLANK
   ============================================================ */

function pickSentenceM3() {
  let candidates = SENTENCES;
  if (state.m3.currentSentence && SENTENCES.length > 1) {
    candidates = SENTENCES.filter(s => s.no !== state.m3.currentSentence.no);
  }
  return pickRandom(candidates);
}

function renderM3() {
  const root = document.getElementById('m3-content');
  let html = '';

  const correctPct = state.m3.sessionStats.total > 0
    ? Math.round(100 * state.m3.sessionStats.correct / state.m3.sessionStats.total) : 0;

  html += `<div class="info-block">
    <b>Frases con huecos</b> — Lee la frase, mira la pista (verbo en español),
    y escribe la forma noruega correcta en cada hueco. El tiempo verbal se revela al comprobar.
  </div>`;

  html += `<div class="stats-bar">
    <div class="stat"><div class="stat-label">Aciertos</div><div class="stat-value aurora">${state.m3.sessionStats.correct}</div></div>
    <div class="stat"><div class="stat-label">Fallos</div><div class="stat-value coral">${state.m3.sessionStats.total - state.m3.sessionStats.correct}</div></div>
    <div class="stat"><div class="stat-label">Intentos</div><div class="stat-value">${state.m3.sessionStats.total}</div></div>
    <div class="stat"><div class="stat-label">% acierto</div><div class="stat-value">${correctPct}%</div></div>
  </div>`;

  if (!state.m3.currentSentence) {
    state.m3.currentSentence = pickSentenceM3();
    state.m3.submitted = false;
  }

  const sent = state.m3.currentSentence;

  // Build the sentence — inputs when active, static results when awaiting next
  let sentenceHTML = '';
  let blankIdx = 0;
  const parts = sent.no.split('___');
  for (let i = 0; i < parts.length; i++) {
    sentenceHTML += escapeHtml(parts[i]);
    if (i < parts.length - 1) {
      if (state.m3.awaitingNext && state.m3.blankResults && state.m3.blankResults[blankIdx] !== undefined) {
        const res = state.m3.blankResults[blankIdx];
        if (res.ok) {
          sentenceHTML += `<span class="blank-spot ok"><span style="color:var(--aurora);font-weight:600;">${escapeHtml(res.correct)}</span></span>`;
        } else {
          sentenceHTML += `<span class="blank-spot bad"><span style="color:var(--coral);font-weight:700;">${escapeHtml(res.correct)}</span></span>`;
        }
      } else {
        sentenceHTML += `<span class="blank-spot" id="m3-blank-${blankIdx}"><input type="text" id="m3-input-${blankIdx}" autocomplete="off" autocapitalize="off" spellcheck="false" data-idx="${blankIdx}" /></span>`;
      }
      blankIdx++;
    }
  }

  // Hint row — before checking: show Spanish only; after checking: show tense too
  let hintsHTML = '';
  for (let i = 0; i < sent.blanks.length; i++) {
    const b = sent.blanks[i];
    const verbData = VERBS.find(v => v.inf === b.inf);
    const spanishWord = verbData ? verbData.es : b.inf;
    const tenseLabels = {
      'pres': { es: 'presente', cls: 'tense-pres' },
      'pret': { es: 'pretérito', cls: 'tense-pret' },
      'inf':  { es: 'infinitivo (sin "å", tras modal)', cls: 'tense-inf' }
    };
    const tl = tenseLabels[b.tense];
    if (state.m3.awaitingNext) {
      hintsHTML += `<span class="h ${tl.cls}">Hueco ${i+1}: ${escapeHtml(spanishWord)} → <b>${tl.es}</b></span>`;
    } else {
      hintsHTML += `<span class="h">Hueco ${i+1}: <b>${escapeHtml(spanishWord)}</b></span>`;
    }
  }

  html += `<div class="card large">
    <span class="kicker amber">FRASE EN CONTEXTO</span>
    <div class="sentence">${sentenceHTML}</div>
    <div class="hint-row">${hintsHTML}</div>
    <div class="translation-line">${escapeHtml(sent.es)}</div>
    <div style="height:18px;"></div>
    <div class="button-row">
      ${state.m3.awaitingNext
        ? `<button class="btn aurora" id="m3-next">Siguiente frase →</button>
           <button class="btn ghost" id="m3-skip">Otra distinta</button>`
        : `<button class="btn" id="m3-check">Comprobar</button>
           <button class="btn ghost" id="m3-reveal">Mostrar respuesta</button>`}
    </div>
    <div class="feedback" id="m3-feedback"></div>
  </div>`;

  root.innerHTML = html;

  // Attach handlers — inputs only exist when NOT awaitingNext
  if (!state.m3.awaitingNext) {
    for (let i = 0; i < sent.blanks.length; i++) {
      const inp = document.getElementById('m3-input-' + i);
      if (!inp) continue;
      if (i === 0) inp.focus();
      inp.addEventListener('keydown', e => {
        if (e.key === 'Enter') {
          e.preventDefault();
          const next = document.getElementById('m3-input-' + (i + 1));
          if (next) next.focus();
          else {
            const checkBtn = document.getElementById('m3-check');
            if (checkBtn) { enterCooldown = true; setTimeout(() => { enterCooldown = false; }, 300); checkBtn.click(); }
          }
        }
      });
    }
  }
  const checkBtn = document.getElementById('m3-check');
  if (checkBtn) checkBtn.onclick = checkM3;
  const nextBtn = document.getElementById('m3-next');
  if (nextBtn) nextBtn.onclick = nextM3;
  const skipBtn = document.getElementById('m3-skip');
  if (skipBtn) skipBtn.onclick = nextM3;
  const revealBtn = document.getElementById('m3-reveal');
  if (revealBtn) revealBtn.onclick = revealM3;

  // Inject pending feedback (set by checkM3/revealM3 before calling renderM3)
  if (state.m3.pendingFeedback) {
    const fb = document.getElementById('m3-feedback');
    if (fb) {
      fb.className = state.m3.pendingFeedback.cls;
      if (state.m3.pendingFeedback.amber) {
        fb.style.background = 'var(--bg-warm)';
        fb.style.borderColor = 'var(--amber)';
        fb.style.color = 'var(--ink)';
      }
      fb.innerHTML = state.m3.pendingFeedback.html;
    }
  }
}

function getExpectedFormForBlank(blank) {
  const verb = VERBS.find(v => v.inf === blank.inf);
  if (!verb) return { value: '???', verb: null };
  let val;
  if (blank.tense === 'pres') val = verb.pres;
  else if (blank.tense === 'pret') val = verb.pret;
  else val = verb.inf.replace(/^å /, '');
  return { value: val, verb };
}

function checkM3() {
  const sent = state.m3.currentSentence;
  let allOK = true;
  let details = [];

  state.m3.blankResults = {};

  for (let i = 0; i < sent.blanks.length; i++) {
    const blank = sent.blanks[i];
    const expected = getExpectedFormForBlank(blank);
    const inp = document.getElementById('m3-input-' + i);
    const got = inp ? inp.value.trim() : '';
    const ok = compareForms(got, expected.value, getAlternates(expected.value));
    state.m3.blankResults[i] = { ok, correct: expected.value, got };
    if (!ok) allOK = false;
    details.push({ idx: i, ok, expected: expected.value, got, verb: expected.verb, tense: blank.tense });
  }

  state.m3.sessionStats.total += 1;
  if (allOK) state.m3.sessionStats.correct += 1;

  let feedbackCls, feedbackHTML;
  if (allOK) {
    feedbackCls = 'feedback correct show';
    feedbackHTML = `<strong>Riktig! · Correcto</strong>
      <div style="margin-top:8px;">${details.map(d => {
        const tn = d.tense === 'pres' ? 'presente' : d.tense === 'pret' ? 'pretérito' : 'infinitivo';
        return `Hueco ${d.idx+1} (${tn}): <b>${escapeHtml(d.expected)}</b>`;
      }).join(' · ')}</div>
      <div style="margin-top:12px;"><button class="btn ghost" style="font-size:12px;padding:4px 10px;" onclick="reportError(buildReportContextM3())">⚑ Reportar error</button></div>`;
  } else {
    feedbackCls = 'feedback incorrect show';
    let fh = `<strong>Feil · Algunos huecos están mal</strong>`;
    for (const d of details) {
      const tn = d.tense === 'pres' ? 'presente' : d.tense === 'pret' ? 'pretérito' : 'infinitivo';
      fh += `<div style="margin-top:8px;"><b>Hueco ${d.idx+1}</b> (${tn} de ${escapeHtml(d.verb ? d.verb.inf : '?')}): `;
      if (d.ok) {
        fh += `<span style="color:var(--aurora);">✓ ${escapeHtml(d.expected)}</span>`;
      } else {
        fh += `<span style="color:var(--coral);">✗ "${escapeHtml(d.got || '(vacío)')}"</span> → la respuesta es <b>${escapeHtml(d.expected)}</b>`;
        if (d.verb) fh += `<div style="font-size:13px;margin-top:4px;font-style:italic;">${explainGroup(d.verb)}</div>`;
      }
      fh += `</div>`;
    }
    fh += `<div style="margin-top:12px;"><button class="btn ghost" style="font-size:12px;padding:4px 10px;" onclick="reportError(buildReportContextM3())">⚑ Reportar error</button></div>`;
    feedbackHTML = fh;
  }

  state.m3.pendingFeedback = { cls: feedbackCls, html: feedbackHTML };
  state.m3.awaitingNext = true;
  renderM3();
}

function revealM3() {
  const sent = state.m3.currentSentence;
  state.m3.sessionStats.total += 1;

  state.m3.blankResults = {};
  for (let i = 0; i < sent.blanks.length; i++) {
    const expected = getExpectedFormForBlank(sent.blanks[i]);
    state.m3.blankResults[i] = { ok: false, correct: expected.value, got: '' };
  }

  let html = `<strong>Respuesta revelada · Feil</strong>`;
  for (let i = 0; i < sent.blanks.length; i++) {
    const b = sent.blanks[i];
    const expected = getExpectedFormForBlank(b);
    const tn = b.tense === 'pres' ? 'presente' : b.tense === 'pret' ? 'pretérito' : 'infinitivo';
    html += `<div style="margin-top:8px;"><b>Hueco ${i+1}</b> (${tn} de ${escapeHtml(b.inf)}): <b>${escapeHtml(expected.value)}</b></div>`;
  }
  html += `<div style="margin-top:12px;"><button class="btn ghost" style="font-size:12px;padding:4px 10px;" onclick="reportError(buildReportContextM3())">⚑ Reportar error</button></div>`;
  state.m3.pendingFeedback = { cls: 'feedback show', html, amber: true };

  state.m3.awaitingNext = true;
  renderM3();
}

function nextM3() {
  state.m3.currentSentence = null;
  state.m3.awaitingNext = false;
  state.m3.blankResults = null;
  state.m3.pendingFeedback = null;
  renderM3();
}

/* ============================================================
   MODULE 4 - DICTIONARY
   ============================================================ */

function renderM4() {
  const root = document.getElementById('m4-content');

  let html = '';
  html += `<div class="info-block">
    <b>Diccionario</b> — Busca, ordena y consulta los <b>${VERBS.length} verbos</b> de tu colección.
    Puedes ordenarlos por categoría/grupo, alfabéticamente en noruego o en español.
  </div>`;

  html += `<div class="dict-controls">
    <div class="search">
      <input type="text" id="m4-search" placeholder="Buscar… (noruego o español, e.g. 'å bo' o 'vivir')" value="${escapeHtml(state.m4.search)}" />
    </div>
    <div class="sort-buttons">
      <button data-sort="group" class="${state.m4.sortBy === 'group' ? 'active' : ''}">Por categoría</button>
      <button data-sort="alpha-no" class="${state.m4.sortBy === 'alpha-no' ? 'active' : ''}">A-Z noruego</button>
      <button data-sort="alpha-es" class="${state.m4.sortBy === 'alpha-es' ? 'active' : ''}">A-Z español</button>
    </div>
  </div>`;

  // Filter
  const q = state.m4.search.trim().toLowerCase();
  let filtered = VERBS;
  if (q) {
    filtered = VERBS.filter(v =>
      v.inf.toLowerCase().includes(q) ||
      v.pres.toLowerCase().includes(q) ||
      v.pret.toLowerCase().includes(q) ||
      v.es.toLowerCase().includes(q)
    );
  }

  // Sort
  if (state.m4.sortBy === 'group') {
    const groupOrder = { 1: 1, 2: 2, 3: 3, 4: 4, 'irr': 5 };
    filtered = filtered.slice().sort((a, b) => {
      const ga = groupOrder[a.group] || 99;
      const gb = groupOrder[b.group] || 99;
      if (ga !== gb) return ga - gb;
      return a.inf.localeCompare(b.inf, 'no');
    });
  } else if (state.m4.sortBy === 'alpha-no') {
    filtered = filtered.slice().sort((a, b) =>
      a.inf.replace(/^å /, '').localeCompare(b.inf.replace(/^å /, ''), 'no')
    );
  } else if (state.m4.sortBy === 'alpha-es') {
    filtered = filtered.slice().sort((a, b) => a.es.localeCompare(b.es, 'es'));
  }

  html += `<div class="dict-stats">${filtered.length} de ${VERBS.length} verbos</div>`;

  html += `<div class="dict-table">`;
  html += `<div class="dict-row header">
    <div>Gr</div>
    <div>Infinitivo</div>
    <div>Presens</div>
    <div>Preteritum</div>
    <div>Perfektum</div>
    <div>Español</div>
  </div>`;

  for (const v of filtered) {
    const cls = (v.group === 'irr') ? 'irr' : 'g' + v.group;
    const grpLabel = v.group === 'irr' ? 'IR' : v.group;
    html += `<div class="dict-row">
      <div class="grp ${cls}">${grpLabel}</div>
      <div>${escapeHtml(v.inf)}</div>
      <div>${escapeHtml(v.pres)}</div>
      <div>${escapeHtml(v.pret)}</div>
      <div>${escapeHtml(v.perf)}</div>
      <div class="es">${escapeHtml(v.es)}</div>
    </div>`;
  }
  html += `</div>`;

  root.innerHTML = html;

  // Handlers
  const searchInput = document.getElementById('m4-search');
  if (searchInput) {
    searchInput.addEventListener('input', e => {
      state.m4.search = e.target.value;
      renderM4();
      // Restore focus and cursor position
      const newInput = document.getElementById('m4-search');
      if (newInput) {
        newInput.focus();
        newInput.setSelectionRange(state.m4.search.length, state.m4.search.length);
      }
    });
  }
  document.querySelectorAll('.sort-buttons button').forEach(btn => {
    btn.onclick = () => {
      state.m4.sortBy = btn.dataset.sort;
      renderM4();
    };
  });
}

/* ============================================================
   APP INIT / TABS / META
   ============================================================ */

function updateMeta() {
  document.getElementById('meta-total').textContent = VERBS.length;
  const learned = Object.values(state.m1.correctStreak || {}).filter(c => c >= 2).length;
  document.getElementById('meta-progress').textContent = learned;
}

function activateTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelector(`.tab[data-tab="${tab}"]`).classList.add('active');
  document.getElementById('panel-' + tab).classList.add('active');

  if (tab === 'm1') renderM1();
  else if (tab === 'm2') renderM2();
  else if (tab === 'm3') renderM3();
  else if (tab === 'm4') renderM4();
}

/* ============================================================
   MODAL HELPER
   ============================================================ */
function showModal(contentHTML) {
  const overlay = document.getElementById('modal-overlay');
  document.getElementById('modal-content').innerHTML = contentHTML;
  overlay.style.display = 'flex';
  overlay.onclick = e => { if (e.target === overlay) closeModal(); };
}
function closeModal() {
  const overlay = document.getElementById('modal-overlay');
  overlay.style.display = 'none';
}

/* ============================================================
   LEVEL UNLOCK
   ============================================================ */
function showUnlockDialog() {
  const maxLevel = Math.max(...Object.keys(LEVEL_PASSWORDS).map(Number));
  let opts = '';
  for (let lvl = 2; lvl <= maxLevel; lvl++) {
    const already = state.m1.unlockedLevel >= lvl || state.m1.levelSize >= lvl;
    opts += `<option value="${lvl}" ${already ? 'disabled' : ''}>${already ? '✓ ' : ''}Nivel ${lvl}</option>`;
  }
  showModal(`
    <h3 style="font-family:'Fraunces',serif;margin:0 0 16px;">Desbloquear nivel</h3>
    <p style="color:var(--ink-muted);font-size:14px;margin-bottom:18px;">Introduce la contraseña del nivel que quieres desbloquear. Todos los niveles anteriores quedarán también desbloqueados.</p>
    <div style="margin-bottom:12px;">
      <label style="font-size:13px;display:block;margin-bottom:6px;">Nivel a desbloquear</label>
      <select id="unlock-level" style="width:100%;padding:8px;border:1px solid var(--rule);border-radius:2px;font-family:'DM Sans',sans-serif;font-size:14px;background:var(--bg);">
        ${opts}
      </select>
    </div>
    <div style="margin-bottom:18px;">
      <label style="font-size:13px;display:block;margin-bottom:6px;">Contraseña</label>
      <input id="unlock-pw" type="password" placeholder="contraseña del nivel" style="width:100%;padding:8px;border:1px solid var(--rule);border-radius:2px;font-family:'DM Sans',sans-serif;font-size:14px;background:var(--bg);box-sizing:border-box;" />
    </div>
    <div id="unlock-msg" style="min-height:20px;font-size:13px;margin-bottom:14px;"></div>
    <div style="display:flex;gap:10px;">
      <button class="btn" onclick="tryUnlock()">Desbloquear</button>
      <button class="btn ghost" onclick="closeModal()">Cancelar</button>
    </div>
  `);
  const pwInp = document.getElementById('unlock-pw');
  if (pwInp) pwInp.addEventListener('keydown', e => { if (e.key === 'Enter') tryUnlock(); });
}

function tryUnlock() {
  const lvl = parseInt(document.getElementById('unlock-level').value);
  const pw  = document.getElementById('unlock-pw').value.trim().toLowerCase();
  const msg = document.getElementById('unlock-msg');
  if (!lvl || isNaN(lvl)) { msg.style.color = 'var(--coral)'; msg.textContent = 'Selecciona un nivel.'; return; }
  if (pw === LEVEL_PASSWORDS[lvl]) {
    // Unlock this level and all below it
    state.m1.unlockedLevel = Math.max(state.m1.unlockedLevel, lvl);
    state.m1.levelSize = Math.max(state.m1.levelSize, lvl);
    state.m1.levelComplete = false;
    state.m1.currentVerb = null;
    state.m1.awaitingNext = false;
    saveState();
    closeModal();
    renderM1();
    updateMeta();
  } else {
    msg.style.color = 'var(--coral)';
    msg.textContent = 'Contraseña incorrecta. Inténtalo de nuevo.';
  }
}

/* ============================================================
   REPORT A BUG / ERROR
   ============================================================ */
function reportError(context) {
  const ts = new Date().toLocaleString('es-ES');
  const text = `[${ts}] ${context}`;
  showModal(`
    <h3 style="font-family:'Fraunces',serif;margin:0 0 12px;">Reportar error</h3>
    <p style="color:var(--ink-muted);font-size:13px;margin-bottom:12px;">Copia el texto siguiente y envíalo para reportar el fallo:</p>
    <textarea id="report-text" readonly style="width:100%;height:100px;font-family:'JetBrains Mono',monospace;font-size:12px;padding:10px;border:1px solid var(--rule);border-radius:2px;background:var(--bg-warm);resize:none;box-sizing:border-box;">${text}</textarea>
    <div id="report-save-msg" style="font-size:13px;margin:10px 0;min-height:18px;"></div>
    <div style="display:flex;gap:10px;flex-wrap:wrap;">
      <button class="btn" onclick="copyReport()">Copiar al portapapeles</button>
      <button class="btn ghost" onclick="downloadReport('${encodeURIComponent(text)}')">Descargar .txt</button>
      <button class="btn ghost" onclick="closeModal()">Cerrar</button>
    </div>
  `);
}

function copyReport() {
  const ta = document.getElementById('report-text');
  if (!ta) return;
  navigator.clipboard.writeText(ta.value).then(() => {
    const msg = document.getElementById('report-save-msg');
    if (msg) { msg.style.color = 'var(--aurora)'; msg.textContent = '¡Copiado al portapapeles!'; }
  }).catch(() => {
    ta.select(); document.execCommand('copy');
  });
}

function downloadReport(encoded) {
  const text = decodeURIComponent(encoded);
  const blob = new Blob([text], { type: 'text/plain' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'norske_verb_reporte.txt';
  a.click();
  const msg = document.getElementById('report-save-msg');
  if (msg) { msg.style.color = 'var(--aurora)'; msg.textContent = 'Archivo descargado.'; }
}

// Build report context from current verb state
function buildReportContext(mod) {
  const verb = state[mod] && state[mod].currentVerb;
  if (!verb) return 'Sin verbo activo.';
  const fi = document.getElementById(mod + '-inf');
  const fp = document.getElementById(mod + '-pres');
  const ft = document.getElementById(mod + '-pret');
  const got = `inf="${fi ? fi.value : '?'}" pres="${fp ? fp.value : '?'}" pret="${ft ? ft.value : '?'}"`;
  return `Módulo: ${mod} | Verbo: ${verb.inf} (${verb.es}) | Respuesta dada: ${got} | Correcto: inf="${verb.inf}" pres="${verb.pres}" pret="${verb.pret}"`;
}
function buildReportContextM3() {
  const sent = state.m3.currentSentence;
  if (!sent) return 'Sin frase activa.';
  return `Módulo: m3 | Frase: "${sent.no}" | ES: "${sent.es}"`;
}

function renderAll() {
  renderM1();
  renderM2();
  renderM3();
  renderM4();
  updateMeta();
}

document.querySelectorAll('.tab').forEach(t => {
  t.addEventListener('click', () => activateTab(t.dataset.tab));
});

document.getElementById('reset-link').addEventListener('click', e => {
  e.preventDefault();
  resetProgress();
});

// Init
loadState();
renderAll();

// Global Enter key: advance to next when awaiting
// Uses a short cooldown to prevent the same Enter that triggered checkAnswer from also firing nextQuestion
let enterCooldown = false;

function triggerCheck(mod) {
  enterCooldown = true;
  setTimeout(() => { enterCooldown = false; }, 300);
  if (mod === 'm1' || mod === 'm2') checkAnswer(mod);
  else if (mod === 'm3') checkM3();
}

document.addEventListener('keydown', e => {
  if (e.key !== 'Enter') return;
  const tag = document.activeElement && document.activeElement.tagName;
  if (tag === 'TEXTAREA') return;
  if (tag === 'SELECT') return;
  const overlay = document.getElementById('modal-overlay');
  if (overlay && overlay.style.display !== 'none') return;
  if (enterCooldown) return;

  const activeTab = document.querySelector('.panel.active');
  if (!activeTab) return;
  const mod = activeTab.id.replace('panel-', '');

  if (mod === 'm1' || mod === 'm2') {
    if (state[mod] && state[mod].awaitingNext) {
      e.preventDefault();
      nextQuestion(mod);
    }
  } else if (mod === 'm3') {
    if (state.m3.awaitingNext) {
      e.preventDefault();
      nextM3();
    }
  }
});
</script>
